server {
    listen 80;
    server_name family-agent.me www.family-agent.me api.family-agent.me;
    return 301 https://$host$request_uri;
}

# ── Frontend Server (family-agent.me) ──────────────────────────────────
server {
    listen 443 ssl;
    server_name family-agent.me www.family-agent.me;

    ssl_certificate     /etc/letsencrypt/live/family-agent.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-agent.me/privkey.pem;

    root /var/www/family-agent/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── API Server (api.family-agent.me) ────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.family-agent.me;

    ssl_certificate     /etc/letsencrypt/live/family-agent.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-agent.me/privkey.pem;

    location / {
        # Handle Preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://family-agent.me' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Specific handling for the stream if needed (can be part of the main location but kept for clarity)
    location /api/v1/parent/location-stream {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }
}
