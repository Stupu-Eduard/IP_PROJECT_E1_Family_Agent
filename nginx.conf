server {
    listen 80;
    server_name family-agent.me www.family-agent.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name family-agent.me www.family-agent.me;

    ssl_certificate     /etc/letsencrypt/live/family-agent.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-agent.me/privkey.pem;

    # ── Frontend (React build) ─────────────────────────────────────────────
    root /var/www/family-agent/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket — THE PIPE ───────────────────────────────────────────────
    # CRITIC: fără acest bloc WebSocket-ul este blocat de nginx (nu face upgrade)
    location /locatie {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SSE (Server-Sent Events) ───────────────────────────────────────────
    location /api/v1/parent/location-stream {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # ── REST API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
