name: CI/CD

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cheltuieli-familie
    steps:
      - name: Trage codul de pe GitHub
        uses: actions/checkout@v4

      - name: Instaleaza Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

    
      - name:  Ruleaza Testele JUnit
        run: mvn test

      - name: Compileaza aplicatia (Creeaza .jar)
        if: github.ref == 'refs/heads/main'
        run: mvn clean package -DskipTests

      - name: Trimite doar fisierul .jar pe server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "cheltuieli-familie/target/*.jar" # Trimitem doar rezultatul compilarii, nu tot repo-ul
          target: "/root/FamilyAgent/target/" # Il punem unde Dockerfile-ul de pe server îl asteapta
          strip_components: 2

      - name: Reconstruieste și Restarteaza Docker pe Server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/FamilyAgent/
            # Folosim Dockerfile-ul existent pe server pentru a crea noua imagine
            docker compose up -d --build backend