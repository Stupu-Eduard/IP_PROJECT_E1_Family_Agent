spring:
  datasource:
    url: jdbc:h2:mem:family_agent;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

qdrant:
  host: localhost
  port: 6333
  collection-name: expenses

# Disable Qdrant for demo mode (optional - set to true to skip vector operations)
# demo.mode: true
