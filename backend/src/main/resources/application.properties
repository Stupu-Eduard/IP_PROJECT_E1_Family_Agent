spring.application.name=cheltuieli-familie

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/main_db}
tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata/
spring.datasource.username=FamilyDB
spring.datasource.password=${DATABASE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=18
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
spring.flyway.locations=classpath:db/migration, classpath:db/postgres

server.port=8080