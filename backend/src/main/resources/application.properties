spring.application.name=cheltuieli-familie

tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata/
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/family_agent}
spring.datasource.username=user
spring.datasource.password=${DATABASE_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver
# Preventie delete
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=18
spring.flyway.out-of-order=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
spring.flyway.locations=classpath:db/migration, classpath:db/postgres

server.port=8080
