spring.application.name=cheltuieli-familie

spring.datasource.url=jdbc:postgresql://localhost:5433/main_db

spring.datasource.username=FamilyDB
spring.datasource.password=${DATABASE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=true

spring.flyway.locations=classpath:db/migration, classpath:db/postgres