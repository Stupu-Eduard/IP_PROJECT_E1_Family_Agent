spring.application.name=cheltuieli-familie

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/main_db}
tesseract.datapath=/usr/share/tesseract-ocr/5/tessdata/
spring.datasource.username=postgres
spring.datasource.password= e

spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-version=18
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
spring.flyway.locations=classpath:db/migration, classpath:db/postgres

server.port=8081

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# Database Encoding (for some drivers)
spring.datasource.sql-script-encoding=UTF-8