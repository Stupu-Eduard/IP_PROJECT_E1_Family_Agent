spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/family_agent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

qdrant:
  host: qdrant
  port: 6333
  collection-name: expenses

# LangChain4j Config referencing .env values
langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat
  open-router:
    chat-model:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      model-name: nvidia/nemotron-4-340b-instruct
