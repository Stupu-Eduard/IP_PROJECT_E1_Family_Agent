qdrant:
  host: localhost
  port: 6333
  grpc-port: 6334
  collection-name: expenses
  collection:
    vector-size: 2048
    distance: Cosine
    index-type: keyword

ocr:
  language: ron+eng

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://127.0.0.1:5173
      - http://127.0.0.1:3000
      - https://family-agent.me
      - https://api.family-agent.me
      - http://localhost:4173

ai:
  intent-extraction:
    max-retries: 3
    retry-delays-ms: 2000,4000
    default-group-by: category
    default-series-by: person

rag:
  retrieval:
    min-score-threshold: 0.35
    short-query-threshold: 0.22
  expansion:
    min-score-threshold: 0.30

# LangChain4j Config referencing .env values
langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat
      temperature: 0.1
      timeout: 60
  open-router:
    chat-model:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      model-name: nvidia/nemotron-4-340b-instruct
    embedding-model:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      model-name: nvidia/llama-nemotron-embed-vl-1b-v2:free
      dimensions: 2048
